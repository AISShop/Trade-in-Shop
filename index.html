<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIS Trade-in System</title>
<style>
  @font-face{
    font-family:'DB Heavent';
    src:url('DB_Heavent_Med_Cond_v3_2.ttf') format('truetype');
    font-weight:400;
    font-display:swap;
  }
  @font-face{
    font-family:'DB Heavent';
    src:url('DBHeavent-BlackCond.ttf') format('truetype');
    font-weight:700;
    font-display:swap;
  }
  body{margin:0;font-family:'DB Heavent','Sarabun','Segoe UI',system-ui,sans-serif;
       background:#0d1620;color:#e8eef3;min-height:100vh;
       display:grid;place-items:center;text-align:center}
  .box{padding:30px}
  .logo{width:54px;height:54px;border-radius:13px;background:#8DC63F;color:#0A5C36;
       display:grid;place-items:center;font-weight:800;font-size:26px;margin:0 auto 18px}
  h1{font-size:20px;margin:0 0 6px}
  p{color:#8aa0b2;margin:0 0 24px;font-size:14px}
  .links{display:flex;flex-direction:column;gap:10px;max-width:280px;margin:0 auto}
  a{display:block;padding:13px;border-radius:11px;text-decoration:none;font-weight:700;font-size:15px}
  a.primary{background:#8DC63F;color:#0A5C36}
  a.ghost{background:#16202b;color:#e8eef3;border:1px solid #2a3a48}
</style>
</head>
<body>
<div class="box">
  <div class="logo">A</div>
  <h1>AIS Trade-in System</h1>
  <p>AIS Shop Area South</p>
  <div class="links">
    <a class="primary" href="StaffForm.html">บันทึก Trade-in</a>
    <a class="ghost" href="Register.html">ลงทะเบียนพนักงาน</a>
    <a class="ghost" href="AdminDashboard.html">Admin Dashboard</a>
  </div>
</div>
</body>
</html>
