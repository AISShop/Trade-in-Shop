<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIS Staff Admin — Trade-in</title>
<style>
  :root{
    --green:#0A5C36; --lime:#8DC63F; --ink:#0f1722; --panel:#16202b;
    --panel2:#1d2a37; --line:#2a3a48; --muted:#8aa0b2; --txt:#e8eef3;
    --danger:#e0533d; --warn:#e0a93d; --ok:#3dba6f;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Sarabun','Segoe UI',system-ui,sans-serif;
       background:var(--ink);color:var(--txt);font-size:14px}
  header{background:linear-gradient(135deg,var(--green),#0d7344);
         padding:14px 18px;display:flex;align-items:center;gap:12px;
         position:sticky;top:0;z-index:10;box-shadow:0 2px 10px rgba(0,0,0,.4)}
  header .logo{width:34px;height:34px;border-radius:8px;background:var(--lime);
       display:grid;place-items:center;font-weight:800;color:var(--green)}
  header h1{font-size:17px;margin:0;font-weight:700;letter-spacing:.3px}
  header .env{margin-left:auto;font-size:11px;padding:3px 9px;border-radius:20px;
       background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.15)}
  .wrap{max-width:1100px;margin:0 auto;padding:16px}
  .bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px}
  .tabs{display:flex;gap:6px;background:var(--panel);padding:4px;border-radius:10px}
  .tabs button{background:none;border:0;color:var(--muted);padding:8px 16px;
       border-radius:7px;cursor:pointer;font-weight:600;font-size:13px}
  .tabs button.on{background:var(--green);color:#fff}
  .grow{flex:1}
  .search{background:var(--panel);border:1px solid var(--line);border-radius:9px;
       padding:8px 12px;color:var(--txt);min-width:180px}
  .chk{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:12px;
       background:var(--panel);padding:7px 11px;border-radius:9px;border:1px solid var(--line);cursor:pointer}
  .btn{background:var(--lime);color:var(--green);border:0;padding:9px 15px;
       border-radius:9px;font-weight:700;cursor:pointer;font-size:13px}
  .btn.ghost{background:var(--panel);color:var(--txt);border:1px solid var(--line)}
  .btn.sm{padding:5px 10px;font-size:12px;border-radius:7px}
  .stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;
       padding:12px 16px;min-width:110px}
  .stat .n{font-size:24px;font-weight:800;color:var(--lime)}
  .stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  table{width:100%;border-collapse:collapse}
  th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}
  th{background:var(--panel2);color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0}
  tr:hover td{background:rgba(141,198,63,.05)}
  tr.del td{opacity:.45}
  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700}
  .pill.on{background:rgba(61,186,111,.16);color:var(--ok)}
  .pill.off{background:rgba(224,83,61,.16);color:var(--danger)}
  .pic{width:30px;height:30px;border-radius:50%;object-fit:cover;background:var(--panel2);vertical-align:middle}
  .nm{font-weight:600}
  .sub{font-size:11px;color:var(--muted)}
  .acts{display:flex;gap:5px;flex-wrap:wrap}
  .ico{background:var(--panel2);border:1px solid var(--line);color:var(--txt);
       width:30px;height:30px;border-radius:7px;cursor:pointer;display:grid;place-items:center;font-size:13px}
  .ico:hover{border-color:var(--lime)}
  .ico.danger:hover{border-color:var(--danger);color:var(--danger)}
  .empty{padding:40px;text-align:center;color:var(--muted)}
  /* modal */
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;place-items:center;z-index:50;padding:16px}
  .ov.show{display:grid}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;
       width:100%;max-width:460px;padding:20px;max-height:90vh;overflow:auto}
  .modal h3{margin:0 0 14px}
  .fld{margin-bottom:12px}
  .fld label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
  .fld input,.fld select{width:100%;background:var(--ink);border:1px solid var(--line);
       border-radius:9px;padding:9px 11px;color:var(--txt);font-size:13px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .mfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
       background:var(--panel2);border:1px solid var(--line);padding:11px 18px;
       border-radius:10px;font-size:13px;z-index:99;opacity:0;transition:.3s;pointer-events:none}
  .toast.show{opacity:1;bottom:30px}
  .toast.ok{border-color:var(--ok)} .toast.err{border-color:var(--danger)}
  .cfg{font-size:11px;color:var(--muted);margin-top:10px;word-break:break-all}
  .cfg a{color:var(--lime);cursor:pointer}
</style>
</head>
<body>
<header>
  <div class="logo">A</div>
  <h1>AIS Staff Admin</h1>
  <span class="env" id="envTag">MOCK MODE</span>
</header>

<div class="wrap">
  <div class="stats" id="stats"></div>

  <div class="bar">
    <div class="tabs">
      <button class="on" data-type="ais" onclick="switchTab('ais')">AIS Staff</button>
      <button data-type="pc" onclick="switchTab('pc')">PC Staff</button>
    </div>
    <div class="grow"></div>
    <input class="search" id="search" placeholder="ค้นหา ชื่อ / สาขา / UID..." oninput="render()">
    <label class="chk"><input type="checkbox" id="showDel" onchange="render()"> แสดงที่ลบแล้ว</label>
    <button class="btn" onclick="openAdd()">+ เพิ่มพนักงาน</button>
    <button class="btn ghost" onclick="loadData()">↻ รีเฟรช</button>
  </div>

  <div class="card">
    <table>
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none">ไม่พบข้อมูล</div>
  </div>

  <div class="cfg">
    Backend: <span id="cfgUrl">— (mock)</span> · <a onclick="setBackend()">ตั้งค่า /exec URL</a>
  </div>
</div>

<!-- modal -->
<div class="ov" id="ov">
  <div class="modal">
    <h3 id="mTitle">เพิ่มพนักงาน</h3>
    <input type="hidden" id="f_id">
    <div class="fld"><label>ชื่อ (Username/Name)</label><input id="f_name"></div>
    <div class="row2">
      <div class="fld"><label>PIN</label><input id="f_pin"></div>
      <div class="fld" id="brandFld"><label>Brand</label><input id="f_brand"></div>
    </div>
    <div class="fld"><label>สาขา (Branch)</label><input id="f_branch"></div>
    <div class="row2">
      <div class="fld"><label>LINE Name (LineID)</label><input id="f_lineId"></div>
      <div class="fld"><label>userId (UID)</label><input id="f_uid"></div>
    </div>
    <div class="fld"><label>PictureUrl</label><input id="f_picture"></div>
    <div class="mfoot">
      <button class="btn ghost" onclick="closeModal()">ยกเลิก</button>
      <button class="btn" onclick="saveStaff()">บันทึก</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============ CONFIG ============ */
var BACKEND_URL = localStorage.getItem('adminBackendUrl') || 'https://script.google.com/macros/s/AKfycbxnFHnV6xFxZgl3JncF3VTf10Lmm6ewrEjADfcKRpKNIbpRzyYG0CWGIko9ZLmgNCdmDA/exec';
var curType = 'ais';
var DB = { ais:[], pc:[] };

/* ============ MOCK DATA ============ */
var MOCK = {
  ais:[
    {id:'A0001',lineId:'Pae AIS',name:'pae.s',pin:'1234',branch:'Phuket Festival',active:true,created:'2026-06-01 09:12:00',updated:'2026-06-01 09:12:00',picture:'',uid:'U1a2b3c4d5e6f7g8h9',deleted:false},
    {id:'A0002',lineId:'Nok',name:'nok.k',pin:'5678',branch:'Hat Yai',active:true,created:'2026-06-02 10:30:00',updated:'2026-06-02 10:30:00',picture:'',uid:'U9z8y7x6w5v4u3t2s1',deleted:false},
    {id:'A0003',lineId:'Tar',name:'tar.m',pin:'0000',branch:'Surat Thani',active:false,created:'2026-06-03 14:05:00',updated:'2026-06-10 11:00:00',picture:'',uid:'Uaaaabbbbccccdddd11',deleted:true}
  ],
  pc:[
    {id:'P0001',lineId:'Mint PC',name:'Mint',pin:'1111',brand:'Samsung',branch:'Phuket Festival',active:true,created:'2026-06-01 09:00:00',updated:'2026-06-01 09:00:00',picture:'',uid:'Upc1111aaaa2222bbbb',deleted:false},
    {id:'P0002',lineId:'Boom',name:'Boom',pin:'2222',brand:'OPPO',branch:'Hat Yai',active:true,created:'2026-06-04 13:20:00',updated:'2026-06-04 13:20:00',picture:'',uid:'Upc3333cccc4444dddd',deleted:false}
  ]
};

/* ============ JSONP CALLER ============ */
function api(params){
  return new Promise(function(resolve,reject){
    if(!BACKEND_URL){ return reject({mock:true}); } // signal mock
    var cb='__cb'+Date.now()+Math.floor(Math.random()*1000);
    var qs=Object.keys(params).map(function(k){
      return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);
    }).join('&');
    var s=document.createElement('script');
    var to=setTimeout(function(){cleanup();reject({error:'timeout'});},12000);
    function cleanup(){clearTimeout(to);delete window[cb];if(s.parentNode)s.parentNode.removeChild(s);}
    window[cb]=function(res){cleanup();resolve(res);};
    s.onerror=function(){cleanup();reject({error:'network'});};
    s.src=BACKEND_URL+'?'+qs+'&cb='+cb;
    document.body.appendChild(s);
  });
}

/* ============ DATA LOAD ============ */
function loadData(){
  api({action:'list',includeDeleted:1}).then(function(res){
    if(res && res.ok){ DB.ais=res.data.ais||[]; DB.pc=res.data.pc||[];
      document.getElementById('envTag').textContent='LIVE';
      document.getElementById('envTag').style.background='rgba(61,186,111,.25)';
      render(); toast('โหลดข้อมูลสำเร็จ','ok');
    } else { toast((res&&res.error)||'โหลดล้มเหลว','err'); }
  }).catch(function(e){
    if(e && e.mock){ DB=JSON.parse(JSON.stringify(MOCK)); render(); }
    else { toast('เชื่อมต่อไม่ได้: '+(e.error||''),'err'); }
  });
}

/* ============ RENDER ============ */
function switchTab(t){
  curType=t;
  document.querySelectorAll('.tabs button').forEach(function(b){
    b.classList.toggle('on',b.dataset.type===t);
  });
  document.getElementById('brandFld').style.display = (t==='pc')?'block':'none';
  render();
}

function render(){
  var rows=DB[curType]||[];
  var showDel=document.getElementById('showDel').checked;
  var q=document.getElementById('search').value.trim().toLowerCase();
  var list=rows.filter(function(r){
    if(r.deleted && !showDel) return false;
    if(!q) return true;
    return [r.name,r.branch,r.uid,r.lineId,r.brand].join(' ').toLowerCase().indexOf(q)>=0;
  });

  // stats
  var all=rows.filter(function(r){return !r.deleted;});
  var act=all.filter(function(r){return r.active;});
  var del=rows.filter(function(r){return r.deleted;});
  document.getElementById('stats').innerHTML=
    statCard(all.length,'ทั้งหมด')+
    statCard(act.length,'Active')+
    statCard(all.length-act.length,'Inactive')+
    statCard(del.length,'ลบแล้ว');

  // header
  var isPc=curType==='pc';
  document.getElementById('thead').innerHTML=
    '<tr><th>ID</th><th>พนักงาน</th>'+(isPc?'<th>Brand</th>':'')+
    '<th>สาขา</th><th>PIN</th><th>Active</th><th>UID</th><th>อัปเดต</th><th></th></tr>';

  // body
  var tb=document.getElementById('tbody'); tb.innerHTML='';
  document.getElementById('empty').style.display=list.length?'none':'block';
  list.forEach(function(r){
    var tr=document.createElement('tr');
    if(r.deleted) tr.className='del';
    var pic=r.picture?'<img class="pic" src="'+r.picture+'">':'<span class="pic"></span>';
    var actBtns='';
    if(r.deleted){
      actBtns='<button class="ico" title="กู้คืน" onclick="doRestore(\''+r.id+'\')">↺</button>';
    } else {
      actBtns=
        '<button class="ico" title="แก้ไข" onclick="openEdit(\''+r.id+'\')">✎</button>'+
        '<button class="ico" title="เปิด/ปิด" onclick="doToggle(\''+r.id+'\')">⏻</button>'+
        '<button class="ico danger" title="ลบ" onclick="doDelete(\''+r.id+'\')">🗑</button>';
    }
    tr.innerHTML=
      '<td><span class="sub">'+r.id+'</span></td>'+
      '<td><div style="display:flex;align-items:center;gap:8px">'+pic+
        '<div><div class="nm">'+esc(r.name)+'</div><div class="sub">'+esc(r.lineId||'')+'</div></div></div></td>'+
      (isPc?'<td>'+esc(r.brand||'')+'</td>':'')+
      '<td>'+esc(r.branch||'')+'</td>'+
      '<td><span class="sub">'+esc(r.pin||'')+'</span></td>'+
      '<td><span class="pill '+(r.active?'on':'off')+'">'+(r.active?'ON':'OFF')+'</span></td>'+
      '<td><span class="sub" style="font-family:monospace">'+esc((r.uid||'').slice(0,14))+(r.uid&&r.uid.length>14?'…':'')+'</span></td>'+
      '<td><span class="sub">'+esc(r.updated||'')+'</span></td>'+
      '<td><div class="acts">'+actBtns+'</div></td>';
    tb.appendChild(tr);
  });
  document.getElementById('cfgUrl').textContent=BACKEND_URL||'— (mock)';
}
function statCard(n,l){return '<div class="stat"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>';}

/* ============ MODAL ============ */
function openAdd(){
  document.getElementById('mTitle').textContent='เพิ่มพนักงาน '+(curType==='pc'?'PC':'AIS');
  ['f_id','f_name','f_pin','f_brand','f_branch','f_lineId','f_uid','f_picture'].forEach(function(id){
    document.getElementById(id).value='';
  });
  document.getElementById('brandFld').style.display=(curType==='pc')?'block':'none';
  show();
}
function openEdit(id){
  var r=(DB[curType]||[]).find(function(x){return x.id===id;}); if(!r)return;
  document.getElementById('mTitle').textContent='แก้ไข '+r.id;
  document.getElementById('f_id').value=r.id;
  document.getElementById('f_name').value=r.name||'';
  document.getElementById('f_pin').value=r.pin||'';
  document.getElementById('f_brand').value=r.brand||'';
  document.getElementById('f_branch').value=r.branch||'';
  document.getElementById('f_lineId').value=r.lineId||'';
  document.getElementById('f_uid').value=r.uid||'';
  document.getElementById('f_picture').value=r.picture||'';
  document.getElementById('brandFld').style.display=(curType==='pc')?'block':'none';
  show();
}
function show(){document.getElementById('ov').classList.add('show');}
function closeModal(){document.getElementById('ov').classList.remove('show');}

function saveStaff(){
  var id=document.getElementById('f_id').value;
  var p={
    type:curType,
    name:document.getElementById('f_name').value.trim(),
    pin:document.getElementById('f_pin').value.trim(),
    branch:document.getElementById('f_branch').value.trim(),
    lineId:document.getElementById('f_lineId').value.trim(),
    uid:document.getElementById('f_uid').value.trim(),
    picture:document.getElementById('f_picture').value.trim()
  };
  if(curType==='pc') p.brand=document.getElementById('f_brand').value.trim();
  if(!p.name){toast('กรุณากรอกชื่อ','err');return;}

  if(id){ p.action='update'; p.id=id; }
  else { p.action='register'; }

  api(p).then(function(res){
    if(res&&res.ok){ toast(id?'แก้ไขสำเร็จ':'เพิ่มสำเร็จ','ok'); closeModal(); loadData(); }
    else { toast((res&&res.error)||'บันทึกล้มเหลว','err'); }
  }).catch(function(e){
    if(e&&e.mock){ mockSave(id,p); closeModal(); render();
      toast(id?'แก้ไขสำเร็จ (mock)':'เพิ่มสำเร็จ (mock)','ok'); }
    else toast('บันทึกล้มเหลว','err');
  });
}

function doToggle(id){ act(id,'toggle','สลับสถานะ'); }
function doRestore(id){ act(id,'restore','กู้คืน'); }
function doDelete(id){
  if(!confirm('ลบพนักงานนี้? (soft delete — กู้คืนได้ภายหลัง)')) return;
  act(id,'remove','ลบ');
}
function act(id,action,label){
  api({action:action,type:curType,id:id}).then(function(res){
    if(res&&res.ok){ toast(label+'สำเร็จ','ok'); loadData(); }
    else toast((res&&res.error)||label+'ล้มเหลว','err');
  }).catch(function(e){
    if(e&&e.mock){ mockAct(id,action); render(); toast(label+'สำเร็จ (mock)','ok'); }
    else toast(label+'ล้มเหลว','err');
  });
}

/* ============ MOCK MUTATORS ============ */
function mockSave(id,p){
  var arr=DB[curType];
  if(id){ var r=arr.find(function(x){return x.id===id;}); if(r){Object.assign(r,p);r.updated=now();} }
  else{
    var pre=curType==='ais'?'A':'P', mx=0;
    arr.forEach(function(x){var n=parseInt((x.id||'').replace(/\D/g,''),10);if(n>mx)mx=n;});
    var nid=pre+('000'+(mx+1)).slice(-4);
    arr.push(Object.assign({id:nid,active:true,deleted:false,created:now(),updated:now()},p));
  }
}
function mockAct(id,action){
  var r=DB[curType].find(function(x){return x.id===id;}); if(!r)return;
  if(action==='toggle')r.active=!r.active;
  if(action==='remove'){r.deleted=true;r.active=false;}
  if(action==='restore'){r.deleted=false;r.active=true;}
  r.updated=now();
}

/* ============ UTIL ============ */
function setBackend(){
  var u=prompt('วาง /exec URL ของ Web App (เว้นว่าง = mock):',BACKEND_URL);
  if(u===null)return;
  BACKEND_URL=u.trim();
  if(BACKEND_URL)localStorage.setItem('adminBackendUrl',BACKEND_URL);
  else localStorage.removeItem('adminBackendUrl');
  document.getElementById('envTag').textContent=BACKEND_URL?'LIVE':'MOCK MODE';
  loadData();
}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function now(){var d=new Date();return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate())+' '+p2(d.getHours())+':'+p2(d.getMinutes())+':'+p2(d.getSeconds());}
function p2(n){return ('0'+n).slice(-2);}
var tT;
function toast(msg,kind){
  var t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show '+(kind||'');
  clearTimeout(tT); tT=setTimeout(function(){t.className='toast';},2600);
}

/* ============ INIT ============ */
switchTab('ais');
loadData();
</script>
</body>
</html>
