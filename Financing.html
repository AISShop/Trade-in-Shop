<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financing — AIS Area South</title>
<style>
  @font-face{ font-family:'DB Heavent'; src:url('DB_Heavent_Med_Cond_v3_2.ttf') format('truetype'); font-weight:400 }
  @font-face{ font-family:'DB Heavent'; src:url('DBHeavent-BlackCond.ttf') format('truetype'); font-weight:800 }
  *{font-family:'DB Heavent','Sarabun','Segoe UI',system-ui,sans-serif !important;box-sizing:border-box}
  :root{
    --green:#0A5C36; --lime:#8DC63F; --ink:#0f1722; --panel:#16202b;
    --panel2:#1d2a37; --line:#2a3a48; --muted:#8aa0b2; --txt:#e8eef3;
    --danger:#e0533d; --warn:#e0a93d; --ok:#3dba6f;
    --cash:#3dba6f; --card:#4c8ff5; --qr:#9b6dff; --fin:#e0a93d;
  }
  body{margin:0;background:var(--ink);color:var(--txt);font-size:18px}
  header{background:linear-gradient(135deg,var(--green),#0d7344);padding:14px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
  header .logo{width:34px;height:34px;border-radius:8px;background:var(--lime);display:grid;place-items:center;font-weight:800;color:var(--green)}
  header h1{margin:0;font-size:20px;font-weight:800}
  .wrap{max-width:1200px;margin:0 auto;padding:16px}
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  .btn{background:var(--lime);color:#08331e;border:0;border-radius:9px;padding:9px 14px;cursor:pointer;font-weight:700;font-size:14px}
  .btn.ghost{background:var(--panel);color:var(--txt);border:1px solid var(--line)}
  .btn:disabled{opacity:.4;cursor:default}
  select{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:8px 12px;color:var(--txt);font-size:14px;font-family:inherit}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
  .card h3{margin:0 0 12px;font-size:17px}
  .stats{display:flex;gap:12px;flex-wrap:wrap}
  .stat{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px 18px;min-width:130px;flex:1}
  .stat .n{font-size:28px;font-weight:800;line-height:1}
  .stat .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
  table{width:100%;border-collapse:collapse}
  th,td{padding:9px 11px;text-align:left;border-bottom:1px solid var(--line);font-size:15px}
  th{background:var(--panel2);color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  .muted{color:var(--muted);font-size:12px}
  .hidden{display:none}
  .seg{display:flex;gap:2px;background:rgba(255,255,255,.05);border-radius:8px;padding:2px}
  .seg .pill{width:14px;height:14px;border-radius:3px;display:inline-block;vertical-align:middle;margin-right:5px}
  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#000;color:#fff;padding:10px 18px;border-radius:10px;opacity:0;transition:.3s;pointer-events:none;z-index:99;font-size:14px}
  #toast.show{opacity:.95}
  #toast.err{background:var(--danger)} #toast.ok{background:var(--ok)}
  .barrow{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .bartrack{flex:1;height:22px;background:#0e1620;border-radius:5px;overflow:hidden;display:flex}
  .barseg{height:100%}
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:var(--txt);margin-top:10px}
  .legend .pill{width:16px;height:16px;border-radius:4px;display:inline-block;vertical-align:middle;margin-right:6px;border:1px solid rgba(255,255,255,.2)}
  .legend span{display:inline-flex;align-items:center;background:rgba(255,255,255,.04);padding:4px 10px;border-radius:8px}
</style>
</head>
<body>
<header>
  <div class="logo">AIS</div>
  <h1>Financing — Area South</h1>
</header>

<div class="wrap">
  <div class="toolbar">
    <label class="btn" style="cursor:pointer">
      ⬆ Import CSV / Excel (Daily/MTD)
      <input type="file" id="finFile" accept=".csv,.xlsx,.xls" style="display:none" onchange="onFinFile(event)">
    </label>
    <div style="display:flex;align-items:center;gap:4px">
      <button class="btn ghost" onclick="finMonthStep(-1)" style="padding:6px 10px">‹</button>
      <select id="finMonth" onchange="finMonthChanged()" style="min-width:150px"></select>
      <button class="btn ghost" onclick="finMonthStep(1)" style="padding:6px 10px">›</button>
    </div>
    <button class="btn ghost" onclick="loadFin(true)">↻ รีเฟรช</button>
    <button class="btn ghost" onclick="finSetView('loc')" id="finViewLoc">By Location</button>
    <button class="btn ghost" onclick="finSetView('user')" id="finViewUser">By User</button>
    <button class="btn ghost" onclick="toggleFinBatches()">📋 ไฟล์ที่ import</button>
    <button class="btn ghost" onclick="exportFin()">⬇ Export Excel</button>
    <span id="finFileName" class="muted"></span>
  </div>

  <div id="finBatches" class="card hidden"></div>
  <div id="finHint" class="card muted">กำลังโหลดข้อมูล…</div>
  <div id="finResult"></div>
</div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
/* ============ CONFIG ============ */
// ใช้ URL เดียวกับ AdminBackend.gs (รวม Financing เข้าไปแล้ว)
var FIN_URL = 'https://script.google.com/macros/s/AKfycbxnFHnV6xFxZgl3JncF3VTf10Lmm6ewrEjADfcKRpKNIbpRzyYG0CWGIko9ZLmgNCdmDA/exec';
var FIN_MGRSUP=[];  // [{name,pin}] Mgr/Sup ที่ไม่นับใน By User
function loadFinMgrSup(){
  jsonp(FIN_URL+'?action=mgrSupList').then(function(res){ if(res&&res.ok)FIN_MGRSUP=res.data||[]; if(FIN_SUM)renderFin(); }).catch(function(){});
}
function finIsMgrSup(user,pin,ename){
  var n=String(ename||user||'').replace(/\s+/g,' ').trim().toUpperCase();
  var u=String(user||'').trim().toUpperCase();
  var p=String(pin||'').trim().replace(/^0+/,'');
  for(var i=0;i<FIN_MGRSUP.length;i++){
    var mn=String(FIN_MGRSUP[i].name||'').replace(/\s+/g,' ').trim().toUpperCase();
    if(mn && (mn===n||mn===u))return true;
    if(p && String(FIN_MGRSUP[i].pin||'').trim().replace(/^0+/,'')===p)return true;
  }
  return false;
}

/* ============ PAY TYPE config ============ */
var PAY_LABELS={ CA:'เงินสด', CC:'บัตรเครดิต', QP:'QR Scan', LS:'SF+', SG:'SG', SH:'Spay Later', UM:'U May+', '':'อื่นๆ' };
var NONFIN=['CA','CC','QP'];       // ไม่ใช่ Finance
var FIN_TYPES=['LS','SG','SH','UM'];    // Finance (Focus) + U May+
var FIN_COLORS={ CA:'var(--cash)', CC:'var(--card)', QP:'var(--qr)', LS:'#e0a93d', SG:'#e07a3d', SH:'#c94fd0', UM:'#00b4e6', '':'#5a6b7a' };
// โลโก้ Finance (inline SVG) — LS=Samsung Finance+ · SG=SGFinance+ · SH=SPayLater
var FIN_LOGOS={
  LS:'<svg viewBox="0 0 120 34" height="26" xmlns="http://www.w3.org/2000/svg"><text x="60" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="13" fill="#111">SAMSUNG</text><text x="60" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-weight="600" font-size="12" fill="#111">Finance+</text></svg>',
  SG:'<svg viewBox="0 0 130 24" height="22" xmlns="http://www.w3.org/2000/svg"><text x="0" y="18" font-family="Arial,sans-serif" font-weight="800" font-size="18"><tspan fill="#e8322f">SG</tspan><tspan fill="#0b3d91">FIN</tspan><tspan fill="#1a73c4">A</tspan><tspan fill="#0b3d91">NCE+</tspan></text></svg>',
  SH:'<svg viewBox="0 0 140 28" height="24" xmlns="http://www.w3.org/2000/svg"><circle cx="14" cy="14" r="9" fill="#f0562e"/><path d="M14 9v5l3 2" stroke="#fff" stroke-width="1.6" fill="none" stroke-linecap="round"/><text x="30" y="20" font-family="Arial,sans-serif" font-weight="700" font-size="17" fill="#f0562e">SPayLater</text></svg>',
  UM:'<svg viewBox="0 0 90 30" height="24" xmlns="http://www.w3.org/2000/svg"><text x="0" y="22" font-family="Arial,sans-serif" font-weight="800" font-size="22"><tspan fill="#00b4e6">U</tspan><tspan fill="#9aa0a6">m</tspan><tspan fill="#e6007e">a</tspan><tspan fill="#ffd200">y</tspan></text><text x="72" y="16" font-family="Arial,sans-serif" font-weight="800" font-size="16" fill="#00b3a4">+</text></svg>'
};

/* ============ location mapping (by CODE) ============ */
var FIN_LOC_NAME={
  '1204':'Shop Central Surat Thani','1205':'Shop Central Hat Yai',
  '1213':'Shop Central Phuket Floresta','1215':'Shop Central Nakhon Si Thammarat',
  '1216':'Shop Central Samui','1241':'Shop Airport Phuket (INTER)',
  '1245':'Shop Serenade Club Central Festival Hat Yai','1252':'Shop Hatyai Village',
  '1255':'Shop Central Phuket Festival','1259':'Shop Robinson Trang'
};
function finLocName(code,fallback){ return FIN_LOC_NAME[String(code||'').trim()]||fallback||('สาขา '+code); }
// รหัสสาขา AIS ที่นับใน By Location (9 สาขา — ตัด 3BB + Airport INTER 1241)
var FIN_LOC_ALLOW={ '1204':1,'1205':1,'1213':1,'1215':1,'1216':1,'1245':1,'1252':1,'1255':1,'1259':1 };
function finLocCounted(code,name){
  var c=String(code||'').trim();
  if(FIN_LOC_ALLOW[c])return true;                       // 9 สาขา AIS
  if(/^\s*3bb/i.test(String(name||'')))return false;     // ตัด 3BB ทุกกรณี
  return false;                                          // ที่เหลือ (1241 ฯลฯ) ไม่นับ
}

/* ============ state ============ */
var FIN_SUM=null, FIN_MONTH='', FIN_MONTHS=[], FIN_BATCHES=null, FIN_PREV=null, FIN_VIEW='loc';
function finSetView(v){ FIN_VIEW=v; renderFin(); }
function prevMonth(m){ var x=String(m||'').match(/^(\d{4})-(\d{2})/); if(!x)return ''; var y=+x[1],mo=+x[2]-1; if(mo<1){y--;mo=12;} return y+'-'+('0'+mo).slice(-2); }

/* ============ helpers ============ */
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
var tT;
function toast(m,k){var t=document.getElementById('toast');t.textContent=m;t.className='show '+(k||'');clearTimeout(tT);tT=setTimeout(function(){t.className='';},2600);}
function jsonp(url){
  return new Promise(function(res,rej){
    var cb='fincb_'+Math.random().toString(36).slice(2);
    var s=document.createElement('script');
    var to=setTimeout(function(){cleanup();rej({error:'timeout'});},20000);
    function cleanup(){clearTimeout(to);delete window[cb];if(s.parentNode)s.parentNode.removeChild(s);}
    window[cb]=function(d){cleanup();res(d);};
    s.src=url+(url.indexOf('?')<0?'?':'&')+'cb='+cb;
    s.onerror=function(){cleanup();rej({error:'network'});};
    document.body.appendChild(s);
  });
}
var TH_MON=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
function monthLabel(m){var mm=String(m||'').match(/^(\d{4})-(\d{2})/);if(!mm)return m||'';return (TH_MON[(+mm[2])-1]||mm[2])+' '+mm[1];}
function thDay(d){var m=String(d||'').match(/^(\d{4})-(\d{2})-(\d{2})/);if(!m)return String(d||'');return (+m[3])+' '+(TH_MON[(+m[2])-1]||m[2]);}
function pct(n,d){return d?(100*n/d):0;}

/* ============ date parse (dd/MM/yyyy incl พ.ศ.) ============ */
function finDate(v){
  if(v==null||v==='')return '';
  var s=String(v).trim();
  var m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(m){var y=+m[3];if(y>2400)y-=543;return y+'-'+('0'+m[2]).slice(-2)+'-'+('0'+m[1]).slice(-2);}
  var m2=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m2)return m2[0];
  return s;
}

/* ============ import CSV ============ */
function onFinFile(ev){
  var f=ev.target.files&&ev.target.files[0];
  if(!f)return;
  document.getElementById('finFileName').textContent='กำลังอ่าน '+f.name+' …';
  var isExcel=/\.xlsx?$/i.test(f.name);
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var buf=e.target.result;
      var data;
      if(isExcel){
        // Excel: SheetJS อ่าน sheet "DATA" (ไม่มีก็เอา sheet แรก)
        var wb=XLSX.read(new Uint8Array(buf),{type:'array'});
        var sn=wb.SheetNames.indexOf('DATA')>=0?'DATA':wb.SheetNames[0];
        data=XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:'',raw:false});
      }else{
        // CSV: cp874 (Thai) + PapaParse delimiter |
        var text;
        try{ text=new TextDecoder('windows-874').decode(buf); }
        catch(_){ text=new TextDecoder('utf-8').decode(buf); }
        data=Papa.parse(text,{header:true,delimiter:'|',skipEmptyLines:true}).data;
      }
      var rows=parseFinRows(data);
      if(!rows.length){ toast('ไม่พบรายการ (เฉพาะ 9 สาขา AIS + PAY TYPE CA/CC/QP/LS/SG/SH/UM)','err'); document.getElementById('finFileName').textContent=''; return; }
      document.getElementById('finFileName').textContent='กำลังอัปโหลด '+rows.length+' รายการ …';
      uploadFin(rows,f.name);
    }catch(err){ toast('อ่านไฟล์ไม่ได้: '+(err.message||err),'err'); document.getElementById('finFileName').textContent=''; }
  };
  reader.readAsArrayBuffer(f);
  ev.target.value='';
}

// เกณฑ์: PAID AMT > 0 · ตัด GW/V1/V2 · เฉพาะ PRODUCT TYPE = DEVICE หรือว่าง
// (ตัด GADGET/IOT/ACCESSORY/SIM/SERVICE) · นับต่อบรรทัด PAY TYPE · Rev = PAID AMT
// ===== LOGIC ใหม่ (ตรง pivot ระบบ) =====
// Finance = PAY TYPE LS/SG/SH/UM · 9 สาขา AIS · นับทุกแถว (ไม่กรอง PAID/DEVICE)
// ตัวหาร = CA/CC/QP + FIN (ตัดแถว pay ว่าง/ขยะ PB/CI/GV/EP ฯลฯ)
var FIN_VALID_PAY={ CA:1, CC:1, QP:1, LS:1, SG:1, SH:1, UM:1 };  // pay type ที่นับ
var FIN_PARSE_ALLOW_LOC={ '1204':1,'1205':1,'1213':1,'1215':1,'1216':1,'1245':1,'1252':1,'1255':1,'1259':1 };
function parseFinRows(data){
  var out=[];
  data.forEach(function(r){
    var code=String(r['LOCATION CODE']||'').trim();
    if(!FIN_PARSE_ALLOW_LOC[code])return;         // เฉพาะ 9 สาขา AIS
    var pay=String(r['PAY TYPE']||'').trim().toUpperCase();
    if(!FIN_VALID_PAY[pay])return;                // เฉพาะ CA/CC/QP/LS/SG/SH/UM (ตัดว่าง/ขยะ)
    var paid=parseFloat(String(r['PAID AMT']||'').replace(/[^0-9.\-]/g,''));
    if(isNaN(paid))paid=0;                        // ไม่กรอง PAID>0 (นับทุกแถวตาม pivot)
    var no=String(r['RECPT/INV NO']||'').trim();
    var d=finDate(r['RECPT/INV DATE']||r['PROCESS DATE']);
    var name=String(r['LOCATION NAME']||'').trim();
    var brand=String(r['BRAND']||'').trim()||'Other';
    var model=String(r['MODEL']||'').trim()||'Other';
    var qty=parseFloat(String(r['QTY']||'').replace(/[^0-9.\-]/g,''));
    if(isNaN(qty))qty=0;
    var pin=String(r['SALE EMPLOYEE CODE']||'').trim().replace(/^0+/,'');  // PIN ตัดเลข 0 นำหน้า
    var uidRaw=String(r['SALE_EMPLOYEE_ID']||'').trim();
    // ถ้า uid เป็นตัวเลขล้วน (PIN) จะ normalize เป็น username ทีหลัง (ต้องใช้ map ทั้งไฟล์)
    var user=uidRaw.toUpperCase()||String(r['SALE EMPLOYEE NAME']||'').trim()||'(ไม่ระบุ)';
    var ename=String(r['SALE EMPLOYEE NAME']||'').trim();
    var pt=String(r['PRODUCT TYPE']||'').trim().toUpperCase();  // สำหรับ %ATR (device)
    // [date, code, name, invNo, pay, paid, brand, model, qty, user, pin, ename, pt]
    out.push([d,code,name,no,pay,paid,brand,model,qty,user,pin,ename,pt]);
  });
  // สร้าง map PIN -> username จากแถวที่ user เป็น username จริง แล้ว normalize uid ที่เป็นตัวเลข
  var pinToUser={};
  out.forEach(function(r){ var u=r[9], p=r[10]; if(u && !/^\d+$/.test(u) && p) pinToUser[p]=u; });
  out.forEach(function(r){ if(/^\d+$/.test(r[9])){ var mapped=pinToUser[r[9].replace(/^0+/,'')]; if(mapped)r[9]=mapped; } });
  return out;
}

function uploadFin(rows,src){
  fetch(FIN_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({action:'finUpload',rows:rows,src:src})})
    .then(function(r){return r.json();})
    .then(function(j){
      if(!j.ok){ toast('อัปโหลดไม่สำเร็จ: '+(j.error||''),'err'); document.getElementById('finFileName').textContent=''; return; }
      document.getElementById('finFileName').textContent=src+' · '+j.inserted+' ใบเสร็จ';
      toast('เพิ่ม '+j.inserted+' รายการ (แทนที่ '+j.removed+') · '+j.dates.length+' วัน','ok');
      FIN_MONTH=''; loadFin(true);
    })
    .catch(function(e){ toast('อัปโหลดไม่สำเร็จ: '+(e.message||e),'err'); document.getElementById('finFileName').textContent=''; });
}

/* ============ load ============ */
function loadFin(force){
  var hint=document.getElementById('finHint');
  hint.textContent='กำลังโหลดข้อมูล…'; hint.classList.remove('hidden');
  jsonp(FIN_URL+'?action=finSummary'+(FIN_MONTH?('&month='+FIN_MONTH):'')).then(function(j){
    if(!j.ok){ hint.textContent='โหลดไม่สำเร็จ: '+(j.error||''); return; }
    FIN_MONTHS=j.months||[];
    if(!FIN_MONTH&&FIN_MONTHS.length){ FIN_MONTH=FIN_MONTHS[FIN_MONTHS.length-1]; fillMonth(); loadFin(true); return; }
    FIN_SUM=j; fillMonth();
    var pm=prevMonth(FIN_MONTH);
    if(pm){
      jsonp(FIN_URL+'?action=finSummary&month='+pm).then(function(p){ FIN_PREV=(p&&p.ok&&p.total)?p:null; renderFin(); })
        .catch(function(){ FIN_PREV=null; renderFin(); });
    }else{ FIN_PREV=null; renderFin(); }
  }).catch(function(e){ hint.textContent='โหลดไม่สำเร็จ: '+(e.error||e.message||e); });
  jsonp(FIN_URL+'?action=finBatches').then(function(j){ if(j.ok)FIN_BATCHES=j.batches||[]; }).catch(function(){});
}
function finMonthChanged(){ FIN_MONTH=document.getElementById('finMonth').value; loadFin(true); }
function finMonthStep(s){
  if(!FIN_MONTHS.length)return;
  var i=FIN_MONTHS.indexOf(FIN_MONTH); if(i<0)i=FIN_MONTHS.length-1;
  var n=i+s; if(n<0||n>=FIN_MONTHS.length)return;
  FIN_MONTH=FIN_MONTHS[n]; document.getElementById('finMonth').value=FIN_MONTH; loadFin(true);
}
function fillMonth(){
  var s=document.getElementById('finMonth');
  s.innerHTML=FIN_MONTHS.map(function(m){return '<option value="'+m+'">'+monthLabel(m)+'</option>';}).join('');
  if(FIN_MONTH)s.value=FIN_MONTH;
  var i=FIN_MONTHS.indexOf(FIN_MONTH);
  var btns=s.parentNode.querySelectorAll('button');
  if(btns.length===2){ btns[0].disabled=(i<=0); btns[1].disabled=(i<0||i>=FIN_MONTHS.length-1); }
}

function toggleFinBatches(){
  var el=document.getElementById('finBatches');
  el.classList.toggle('hidden');
  if(el.classList.contains('hidden'))return;
  if(!FIN_BATCHES||!FIN_BATCHES.length){ el.innerHTML='<div class="muted">ยังไม่มีไฟล์ที่ import</div>'; return; }
  el.innerHTML='<table><thead><tr><th>ไฟล์</th><th style="text-align:right">ใบเสร็จ</th><th>ช่วงวันที่</th><th>อัปโหลดเมื่อ</th></tr></thead><tbody>'+
    FIN_BATCHES.map(function(b){return '<tr><td>'+esc(b.src)+'</td><td style="text-align:right">'+b.rows+'</td><td>'+esc(thDay(b.minD))+' → '+esc(thDay(b.maxD))+'</td><td class="muted">'+esc(b.uploadedAt)+'</td></tr>';}).join('')+'</tbody></table>';
}

/* ============ render ============ */
function renderFin(){
  var hint=document.getElementById('finHint');
  var out=document.getElementById('finResult');
  if(!FIN_SUM||!FIN_SUM.total){
    hint.classList.remove('hidden');
    hint.innerHTML='ยังไม่มีข้อมูล — กด <b>Import CSV</b> เพื่อเริ่ม<br><span class="muted">Finance = LS/SG/SH/U May+ · 9 สาขา AIS · นับทุกแถว · PAID AMT</span>';
    out.innerHTML=''; return;
  }
  hint.classList.add('hidden');

function fmtBaht(n){ n=Math.round(Number(n)||0); return n.toLocaleString('en-US'); }

/* ============ By User (finance รายคน จัดกลุ่มตามสาขา — แสดงทุกคน) ============ */
function renderFinByUser(){
  var bu=FIN_SUM&&FIN_SUM.byUser?FIN_SUM.byUser:{};
  var keys=Object.keys(bu);
  if(!keys.length)return '<div class="card"><h3>By User</h3><div class="muted">ไม่มีข้อมูลรายคน</div></div>';
  var byBranch={};
  keys.forEach(function(k){ var u=bu[k];
    if(finIsMgrSup(u.user,u.pin,u.ename))return;  // ตัด Mgr/Sup ออก
    if(!byBranch[u.code])byBranch[u.code]={code:u.code,locName:u.locName,users:[],total:0,rev:0,sales:0}; byBranch[u.code].users.push(u); byBranch[u.code].total+=u.cnt; byBranch[u.code].rev+=u.rev; byBranch[u.code].sales+=(u.salesTotal||0); });
  var branches=Object.keys(byBranch).map(function(c){return byBranch[c];}).sort(function(a,b){return b.total-a.total;});
  var html='<div class="card"><h3>By User — Finance รายคน (จัดกลุ่มตามสาขา)</h3>'+
    '<table><thead><tr><th>สาขา / พนักงาน</th><th style="text-align:right">ขายรวม</th><th style="text-align:right">Finance</th>'+
      FIN_TYPES.map(function(t){return '<th style="text-align:right">'+esc(PAY_LABELS[t])+'</th>';}).join('')+
      '<th style="text-align:right">%ATR</th><th style="text-align:right">PAID AMT</th></tr></thead><tbody>';
  branches.forEach(function(B){
    var bDevTot=B.users.reduce(function(a,u){return a+(u.devTotal||0);},0);
    var bDevFin=B.users.reduce(function(a,u){return a+(u.devFin||0);},0);
    html+='<tr style="background:rgba(141,198,63,.08);font-weight:700"><td>'+esc(finLocName(B.code,B.locName))+'</td>'+
      '<td style="text-align:right">'+B.sales+'</td>'+
      '<td style="text-align:right">'+B.total+'</td>'+
      FIN_TYPES.map(function(t){var n=B.users.reduce(function(a,u){return a+(u.byType[t]||0);},0);return '<td style="text-align:right">'+(n||'')+'</td>';}).join('')+
      '<td style="text-align:right;color:#8DC63F">'+(bDevTot?pct(bDevFin,bDevTot).toFixed(1):'0.0')+'%</td>'+
      '<td style="text-align:right">'+fmtBaht(B.rev)+'</td></tr>';
    // เรียง: มี finance ก่อน (มากไปน้อย) แล้วคนไม่มี finance
    B.users.sort(function(a,b){ if(b.cnt!==a.cnt)return b.cnt-a.cnt; return (b.salesTotal||0)-(a.salesTotal||0); }).forEach(function(u){
      var zero=(u.cnt===0);
      var op=zero?'opacity:.4':'';
      var uatr=(u.devTotal)?pct(u.devFin,u.devTotal).toFixed(1)+'%':'-';
      html+='<tr style="'+op+'"><td style="padding-left:24px">'+esc(u.user)+'</td>'+
        '<td style="text-align:right;color:var(--muted)">'+(u.salesTotal||0)+'</td>'+
        '<td style="text-align:right">'+(zero?'-':u.cnt)+'</td>'+
        FIN_TYPES.map(function(t){return '<td style="text-align:right;color:var(--muted)">'+(u.byType[t]||'')+'</td>';}).join('')+
        '<td style="text-align:right;color:#8DC63F">'+uatr+'</td>'+
        '<td style="text-align:right">'+(zero?'-':fmtBaht(u.rev))+'</td></tr>';
    });
  });
  html+='</tbody></table><div class="muted" style="margin-top:8px">แสดงพนักงานทุกคน · คนไม่มี Finance = สีทึบจาง · %ATR = Finance (ทุก product) ÷ Device transaction</div></div>';
  return html;
}

/* ============ Daily Finance % chart (เส้นโค้ง + MoM + target) ============ */
// คืน %finance รายวัน (index = วันที่ 1..31)
function finDailyPct(sum){
  var arr={};
  if(!sum||!sum.byDay)return arr;
  Object.keys(sum.byDay).forEach(function(d){
    var dd=sum.byDay[d]||{cnt:{}}; var cnt=dd.cnt||{};
    var tot=Object.keys(cnt).reduce(function(a,k){return a+cnt[k];},0);
    var fin=FIN_TYPES.reduce(function(a,t){return a+(cnt[t]||0);},0);
    var day=+String(d).slice(8,10);
    if(day)arr[day]=tot?100*fin/tot:0;
  });
  return arr;
}
function smoothPath(pts){
  if(pts.length<2)return pts.length?('M'+pts[0][0]+','+pts[0][1]):'';
  var d='M'+pts[0][0]+','+pts[0][1];
  for(var i=0;i<pts.length-1;i++){
    var p0=pts[i-1]||pts[i], p1=pts[i], p2=pts[i+1], p3=pts[i+2]||p2;
    var c1x=p1[0]+(p2[0]-p0[0])/6, c1y=p1[1]+(p2[1]-p0[1])/6;
    var c2x=p2[0]-(p3[0]-p1[0])/6, c2y=p2[1]-(p3[1]-p1[1])/6;
    d+=' C'+c1x+','+c1y+' '+c2x+','+c2y+' '+p2[0]+','+p2[1];
  }
  return d;
}
function finDailyChart(){
  var cur=finDailyPct(FIN_SUM);
  var curDays=Object.keys(cur).map(Number);
  if(!curDays.length)return '';
  var maxDay=31;
  var curVals=curDays.map(function(d){return cur[d];});
  var curAvg=curVals.reduce(function(a,b){return a+b;},0)/(curVals.length||1);

  var W=1400,H=340,padL=44,padR=20,padT=24,padB=40;
  var plotW=W-padL-padR, plotH=H-padT-padB;
  var maxY=Math.max(20, Math.ceil(Math.max.apply(null,curVals.concat([10]))/10)*10);
  function X(day){ return padL+(day-1)/(maxDay-1)*plotW; }
  function Y(v){ return padT+plotH-(v/maxY)*plotH; }

  var grid='';
  for(var g=0;g<=maxY;g+=(maxY>60?20:10)){ var gy=Y(g); grid+='<line x1="'+padL+'" y1="'+gy+'" x2="'+(W-padR)+'" y2="'+gy+'" stroke="#243040" stroke-width="1"/>'+
    '<text x="'+(padL-8)+'" y="'+(gy+4)+'" text-anchor="end" font-size="11" fill="#6b8299">'+g+'%</text>'; }
  var xlabels='';
  for(var dd=1;dd<=maxDay;dd++){ xlabels+='<text x="'+X(dd)+'" y="'+(H-padB+18)+'" text-anchor="middle" font-size="10" fill="#6b8299">'+dd+'</text>'; }

  var cd=curDays.sort(function(a,b){return a-b;});
  var cpts=cd.map(function(d){return [X(d),Y(cur[d])];});
  var curLine=smoothPath(cpts);
  var area='<path d="'+curLine+' L'+cpts[cpts.length-1][0]+','+Y(0)+' L'+cpts[0][0]+','+Y(0)+' Z" fill="url(#finGrad)" opacity="0.25"/>';
  var dots=cd.map(function(d){ return '<circle cx="'+X(d)+'" cy="'+Y(cur[d])+'" r="3.5" fill="#8DC63F"/>'+
    '<text x="'+X(d)+'" y="'+(Y(cur[d])-9)+'" text-anchor="middle" font-size="10" font-weight="700" fill="#8DC63F">'+Math.round(cur[d])+'%</text>'; }).join('');

  var svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto">'+
    '<defs><linearGradient id="finGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8DC63F"/><stop offset="100%" stop-color="#8DC63F" stop-opacity="0"/></linearGradient></defs>'+
    grid+area+'<path d="'+curLine+'" fill="none" stroke="#8DC63F" stroke-width="3"/>'+dots+xlabels+
    '</svg>';

  var legend='<div style="display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-bottom:8px;align-items:center">'+
    '<span><span style="display:inline-block;width:20px;height:3px;background:#8DC63F;vertical-align:middle;margin-right:5px"></span>%Finance '+monthLabel(FIN_MONTH)+'</span>'+
    '<span style="font-weight:700;color:var(--txt)">เฉลี่ย '+curAvg.toFixed(1)+'%</span>'+
  '</div>';

  return '<div class="card"><h3>Daily Finance % — รายวันของเดือน</h3>'+legend+
    svg+
    '<div class="muted" style="margin-top:6px">%Finance รายวัน = (LS/SG/SH/U May+) ต่อ Transaction ในวันนั้น</div></div>';
}

/* ============ Export (ตาม Period ที่เลือก) ============ */
function exportFin(){
  if(!FIN_SUM||!FIN_SUM.total){ toast('ยังไม่มีข้อมูลให้ export','err'); return; }
  if(typeof XLSX==='undefined'){ toast('ตัวช่วย Excel ยังไม่พร้อม','err'); return; }
  var bt=FIN_SUM.byType||{}, rt=FIN_SUM.revByType||{}, total=FIN_SUM.total, revTot=FIN_SUM.revTotal||0;
  var wb=XLSX.utils.book_new();
  var order=['CA','CC','QP','LS','SG','SH','UM'];
  var head=order.map(function(t){return PAY_LABELS[t];});

  // Sheet 1: Summary
  var s1=[['Financing — '+monthLabel(FIN_MONTH)],['ช่วง',thDay(FIN_SUM.minD)+' – '+thDay(FIN_SUM.maxD)],[],
    ['ประเภท','ใบเสร็จ','Share %','Rev (บาท)','Rev Share %']];
  order.forEach(function(t){ s1.push([PAY_LABELS[t],bt[t]||0,pct(bt[t]||0,total).toFixed(2)+'%',Math.round(rt[t]||0),pct(rt[t]||0,revTot).toFixed(2)+'%']); });
  var finC=FIN_TYPES.reduce(function(a,t){return a+(bt[t]||0);},0);
  var finR=FIN_TYPES.reduce(function(a,t){return a+(rt[t]||0);},0);
  s1.push([]);
  s1.push(['รวม',total,'100%',Math.round(revTot),'100%']);
  s1.push(['Finance (LS+SG+SH)',finC,pct(finC,total).toFixed(2)+'%',Math.round(finR),pct(finR,revTot).toFixed(2)+'%']);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s1),'Summary');

  // Sheet 2: Daily
  var s2=[['วันที่','ใบเสร็จ'].concat(head).concat(['Finance %','Fin.Rev %'])];
  Object.keys(FIN_SUM.byDay||{}).sort().forEach(function(d){
    var dd=FIN_SUM.byDay[d]||{cnt:{},rev:{}}; var cnt=dd.cnt||{}, drev=dd.rev||{};
    var dTot=Object.keys(cnt).reduce(function(a,k){return a+cnt[k];},0);
    var dRev=Object.keys(drev).reduce(function(a,k){return a+drev[k];},0);
    var fC=FIN_TYPES.reduce(function(a,t){return a+(cnt[t]||0);},0);
    var fR=FIN_TYPES.reduce(function(a,t){return a+(drev[t]||0);},0);
    s2.push([d,dTot].concat(order.map(function(t){return cnt[t]||0;})).concat([pct(fC,dTot).toFixed(2)+'%',pct(fR,dRev).toFixed(2)+'%']));
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s2),'Daily');

  // Sheet 3: By Location
  var s3=[['Code','Location','ใบเสร็จ'].concat(head).concat(['Finance %','Fin.Rev %','Rev รวม'])];
  Object.keys(FIN_SUM.byLoc||{}).map(function(k){return FIN_SUM.byLoc[k];}).forEach(function(L){
    var fC=FIN_TYPES.reduce(function(a,t){return a+(L.byType[t]||0);},0);
    var fR=FIN_TYPES.reduce(function(a,t){return a+((L.revByType&&L.revByType[t])||0);},0);
    s3.push([L.code,finLocName(L.code,L.name),L.total].concat(order.map(function(t){return L.byType[t]||0;})).concat([pct(fC,L.total).toFixed(2)+'%',pct(fR,L.rev||0).toFixed(2)+'%',Math.round(L.rev||0)]));
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s3),'ByLocation');

  // Sheet 4: By Brand
  var qtyTot=0; Object.keys(FIN_SUM.byBrandFin||{}).forEach(function(b){qtyTot+=FIN_SUM.byBrandFin[b].qty;});
  var s4=[['Brand','Transaction','Qty','Qty %','Rev']];
  Object.keys(FIN_SUM.byBrandFin||{}).map(function(b){return [b,FIN_SUM.byBrandFin[b]];})
    .sort(function(a,b){return b[1].qty-a[1].qty;})
    .forEach(function(x){ var o=x[1]; s4.push([x[0],o.cnt,o.qty,pct(o.qty,qtyTot).toFixed(2)+'%',Math.round(o.rev)]); });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s4),'ByBrand_Finance');

  // Sheet 5: By Model
  var s5=[['Model','Brand','Transaction','Qty','Qty %','Rev']];
  Object.keys(FIN_SUM.byModelFin||{}).map(function(m){return [m,FIN_SUM.byModelFin[m]];})
    .sort(function(a,b){return b[1].qty-a[1].qty;})
    .forEach(function(x){ var o=x[1]; s5.push([x[0],o.brand,o.cnt,o.qty,pct(o.qty,qtyTot).toFixed(2)+'%',Math.round(o.rev)]); });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s5),'ByModel_Finance');

  // Sheet 6: By User (finance รายคน)
  var finHead=FIN_TYPES.map(function(t){return PAY_LABELS[t];});
  var s6=[['Code','Location','User','ขายรวม','Finance'].concat(finHead).concat(['PAID AMT'])];
  var buArr=Object.keys(FIN_SUM.byUser||{}).map(function(k){return FIN_SUM.byUser[k];});
  buArr.sort(function(a,b){ if(a.code!==b.code)return a.code<b.code?-1:1; return (b.cnt||0)-(a.cnt||0); });
  buArr.forEach(function(u){
    s6.push([u.code,finLocName(u.code,u.locName),u.user,u.salesTotal||0,u.cnt||0]
      .concat(FIN_TYPES.map(function(t){return (u.byType&&u.byType[t])||0;}))
      .concat([Math.round(u.rev||0)]));
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s6),'ByUser_Finance');

  var fn='Financing_'+(FIN_MONTH||'all')+'.xlsx';
  XLSX.writeFile(wb,fn);
  toast('ดาวน์โหลด '+fn,'ok');
}
function stat(n,l){return '<div class="stat"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>';}
function statHi(n,l){return '<div class="stat" style="border-color:var(--fin);background:rgba(224,169,61,.08)"><div class="n" style="color:var(--fin)">'+n+'</div><div class="l">'+l+'</div></div>';}

/* ============ boot ============ */
loadFinMgrSup();
loadFin(true);
</script>
